name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Use a PAT so release PRs are authored by a real user and trigger the
          # required CI checks. Falls back to GITHUB_TOKEN until the secret is set
          # (bot-authored release PRs won't run required checks — they must be
          # closed/reopened manually to unblock the CI Success check).
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
