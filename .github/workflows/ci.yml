name: CI

on:
  pull_request:
    branches: [main, main-uat]
  push:
    branches: [main, main-uat]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Enforce the promotion flow: PRs into `main` may only come from `main-uat`
  # (or release-please's own release branches). Feature work targets `main-uat`.
  guard:
    name: guard
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Enforce main-uat as the only source into main
        run: |
          base="${{ github.base_ref }}"
          head="${{ github.head_ref }}"
          if [ "$base" = "main" ] && [ "$head" != "main-uat" ] && [[ "$head" != release-please--* ]]; then
            echo "::error::PRs into 'main' must come from 'main-uat' (or release-please). Got '$head' -> '$base'."
            exit 1
          fi
          echo "Source '$head' -> '$base': allowed."

  # Detect which parts of the monorepo changed so we only test what's affected.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      mobile: ${{ steps.filter.outputs.mobile }}
      web: ${{ steps.filter.outputs.web }}
      server: ${{ steps.filter.outputs.server }}
      packages: ${{ steps.filter.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared: &shared
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - '.github/workflows/ci.yml'
            mobile:
              - *shared
              - 'apps/mobile/**'
            web:
              - *shared
              - 'apps/web/**'
            server:
              - *shared
              - 'apps/server/**'
            packages:
              - *shared
              - 'packages/**'

  mobile:
    name: mobile
    needs: changes
    if: ${{ needs.changes.outputs.mobile == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run lint check-types build test --filter=./apps/mobile

  web:
    name: web
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run lint check-types build test --filter=./apps/web

  server:
    name: server
    needs: changes
    if: ${{ needs.changes.outputs.server == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run lint check-types build test --filter=./apps/server

  packages:
    name: packages
    needs: changes
    if: ${{ needs.changes.outputs.packages == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run lint check-types build test --filter=./packages/*

  # Single required status check: green only if no workspace job failed.
  ci:
    name: CI Success
    if: ${{ always() }}
    needs: [guard, mobile, web, server, packages]
    runs-on: ubuntu-latest
    steps:
      - name: Verify no required job failed
        run: |
          for r in "${{ needs.guard.result }}" "${{ needs.mobile.result }}" "${{ needs.web.result }}" "${{ needs.server.result }}" "${{ needs.packages.result }}"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "A required job did not pass (result: $r)."
              exit 1
            fi
          done
          echo "All required checks passed."
